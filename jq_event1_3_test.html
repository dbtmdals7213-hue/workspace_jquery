<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

	<!-- 제이쿼리 설치 -->
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>

</head>
<body>
	<p>
		<button class="btn1">버튼1</button>
	</p>
	<p>내용1</p>
	<p>
		<button class="btn2">버튼2</button>
	</p>
	<p>내용2</p>
	
	<script type="text/javascript">
		//주제 : 등록한 이벤트를 요소에서 제거시키는  off()메소드 사용법
		//문법
		//	 $("등록된이벤트가있는요소선택").off("제거할이벤트종류명1  제거할이벤트종류명2");
	
		/*
			1. <button class="btn1">버튼1</button> 요소 선택 후 "click" 이벤트 등록
			
			   "click" 이벤트가 발생하면 처리 내용 
			   => <p>내용1</p> 요소 선택 후 "내용1" 글자색 빨강으로 설정
		*/
		$(".btn1").on("click", function(){
			
			$(".btn1").parent().next().css("color", "red");
		});

		/*
			1-1. 위 1. 에서 등록한 "click" 이벤트 버튼1 요소에서 제거시킬 때 off("제거할_이벤트종류명"); 사용
		*/
		$("button:first").off("click");
			   
		/*
			2. <button class="btn2">버튼2</button> 요소 선택 후 "mouseover" 와 "focus" 이벤트 다중 등록
			
			   "mouseover" 또는 "focus" 이벤트 중 하나의 이벤트가 발생하면 이벤트 처리 내용
			   => <p>내용2</p> 요소 선택 후 "내용2" 글자색 파란색으로 설정
		*/
		$(".btn2").on("mouseover focus", function(){
			
			$("p:eq(3)").css("color", "blue");
		});

		/*
			2-1. 2. 에서 등록한 mouseover focus 이벤트를 버튼2 요소에서 제거할 때 off("제거할_이벤트종류1 제거할_이벤트종류2"); 사용
		*/
		$(".btn2").off("mouseover focus");
	</script>
</body>
</html>
