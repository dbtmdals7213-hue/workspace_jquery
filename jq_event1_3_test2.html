<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 예제</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
        }
        .button {
            padding: 5px 10px;
            cursor: pointer;
            margin: 2px;
        }
    </style>
</head>
<body>
	<h1>온라인 쇼핑몰</h1>
	<h2>상품 목록</h2>
	<table id="productTable">
		<thead>
			<tr>
				<th>상품명</th>
				<th>가격</th>
				<th>추가</th>
			</tr>
		</thead>
		<tbody>
			<tr>
	            <td>상품 1</td>
	            <td>10,000원</td>
	            <td><button class="add-to-cart button">장바구니에 추가</button></td>
			</tr>
			<tr>
	            <td>상품 2</td>
	            <td>20,000원</td>
	            <td><button class="add-to-cart button">장바구니에 추가</button></td>
			</tr>
			<tr>
				<td>상품 3</td>
				<td>30,000원</td>
				<td><button class="add-to-cart button">장바구니에 추가</button></td>
			</tr>
		</tbody>
	</table>
	<div id="cart">
		<h2>장바구니</h2>
		<table id="cartTable">
			<thead>
				<tr>
					<th>상품명</th>
					<th>수량</th>
					<th>총 가격</th>
					<th>삭제</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>
		<button id="clearCart" class="button">장바구니 비우기</button>
	</div>
	<script>
		/*
			장바구니를 표현하는 비어있는 객체 {} 로 생성합니다.
			참고. 여기서 상품명을 속성명으로 작성하고, 가격과 수량을 값으로 저장할 것이다.
				 {"상품명1":"가격과 수량", "상품명2": "가격과 수량"} <--- 장바구니 객체
		*/
		let cart = {};
		
		/*
			"장바구니에 추가" button 3개를 모두 다중 선택해서 'click' 이벤트 등록, 또한 3개의 button 중에서
			하나의 버튼에 'click' 이벤트가 발생하면 실행되는 이벤트 핸들러 함수 정의
		*/
		$(".add-to-cart").on("click", function(){
			
			// $(this).closest(selectors);
			// - $(this) : 탐색을 시작할 <button class="add-to-cart button">장바구니에 추가</button> 요소 선택
			// - selectors : 찾고자 하는 상위 요소의 css 선택자 문법 작성 자리(예: 'my-class', 'div')
			
			//1. click 된 장바구니 추가 <button> 을 감싸고 있는 부모 <tr></tr> 요소를 찾아 선택해 가져옴
			let row = $(this).closest('tr');
			
			//2. 해당 <tr></tr> 행의 첫 번째 <td>상품 1</td> 셀에서 '상품 1' 을 가져옵니다.
			//	 -> click 한 장바구니 추가 <button> 행의 상품명 '상품 1' 열기
			let productName = row.find('td:first').text();
			//	  '상품 1'
			
			//3. 가격 '10,000원' 을 가져와서 숫자로 변환합니다.
			// 여기서는 replace() 메소드를 사용하여 문자열에서 쉼표와 '원' 을 제거합니다.
			/*
				<tr>
		            <td>상품 1</td>
		            <td>10,000원</td>
		            <td><button class="add-to-cart button">장바구니에 추가</button></td>
				</tr>
				요소에서 두 번째 <td>10,000원</td> 을 얻어 .text() 메소드로 "10,000원" 을 얻고
				"10,000원".replace(",", "") 를 호출하여 , 문자를 "" 로 치환한 전체 문자열 "10 000원" 을 얻고
				"10 000원".replace("원", "") 를 호출하여 "원" 문자를 "" 로 치환한 전체문자열 "10 000 " 을 얻습니다.
				얻은 "10 000 " 문자열을 숫자로 변환해서 얻기 위해 parseInt() 를 사용하면 10000로 변환해서 얻습니다.
			*/
			let productPrice = parseInt(row.find("td:nth-child(2)").text().replace(",", "").replace("원", ""));
			
			//4. 장바구니 cart {} 객체에 상품 추가 또는 수량 증가
			if(cart[productName]){// 장바구니 역할을 하는 cart {} 객체에 클릭한 button 의 행의 상품이 이미 저장되어 있다면?
				
			}else{// 장바구니 역할을 하는 cart {} 객체에 클릭한 button 의 행의 상품 정보가 없다면?
				
				// 클릭한 button 의 행의 상품 정보를 cart {} 객체에 "상품명": {"가격":가격, "수량":수량} 형태로 추가
				cart[productName] = {price:productPrice, quantity:1};
				//   cart[상품 1]	  = {price:10000,        quantity:1};
			}
			
			//5. 장바구니에 담긴 브라우저 화면을 업데이트 하는 함수 호출
			updateCart();
			
		});// <- on(function(){});
		
		//5-1. 장바구니 화면을 업데이트 하는 기능의 함수
		function updateCart(){
			
			// 장바구니 <table></table> 부모 요소 아래에 만들어져 있는 자식 <tbody></tbody> 요소 선택
			let cartTableBody = $("#cartTable tbody");
			
			// 만약 <tbody>...</tbody> 사이에 추가된 상품 정보의 행이 있으면? 모든 자식 요소들 제거(비우자)
			cartTableBody.empty();
			
			// <tbody></tbody> 사이에 표시할 상품들의 "총 가격" 을 저장할 변수 선언
			let totalPrice = 0;
			/*
				cart 객체(장바구니) 모습
				
				cart[상품 1] = {price:10000, quantity:1};
			*/
			// cart 객체를 순회하면서 각 상품의 상품명과 가격과 수량 정보를 얻어 사용
			$.each(cart, function(name, item){
								// 상품1, {price:10000, quantity:1}
				
				// 클릭한 장바구니 추가 <button> 이 속한 행의 상품 가격 = 가격 X 수량
				let totalItemPrice = item.price * item.quantity;
				
				// 클릭한 장바구니 추가 <button> 이 속한 행의 상품 가격을 총 가격 변수에 누적
				totalPrice += totalItemPrice;
				
				// 클릭한 장바구니 추가 <button> 하나의 상품 정보가 보여질 <tr></tr> 한 쌍을 새로 만들어 <tbody></tbody> 사이에 추가
				cartTableBody.append(`
					
					<tr>
						<td>${name}</td>
						<td>
							<button class="decrease-quantity button">-</button>
							<span>${item.quantity}</span>
							<button class="increase-quantity button">+</button>
							<span>${item.quantity}</span>
						</td>
						<td>${totalItemPrice.toLocaleString()}원</td>
						<td><button class="remove-item button">삭제</button></td>
					</tr>
				`);
			});// <--- $.each 메소드 호출 끝
		}
		
		
		
		 
	</script>
	<!--
		jQuery의 off() 메소드를 활용하여 장바구니의 상품을 추가하고, 
		해당 상품의 수량을 조절하며, 
		필요 시 이벤트를 제거하는 예제를 만들어보자. 
		장바구니에서 상품 수량을 증가 또는 감소시키는 버튼을 클릭할 때 
		해당 이벤트를 동적으로 추가하고 제거하는 방식을 보여줍니다.
		======================================================================
		.off('click')를 사용하는 이유
		            
			1. 이벤트 중복 방지:
			.on('click', ...) 을 여러 번 호출하면, 
				동일한 버튼에 대해 클릭 이벤트가 여러 번 등록될 수 있습니다. 
				이 경우 버튼을 클릭할 때마다 여러 번의 함수가 실행될 수 있습니다.
				예를 들어, 사용자가 수량 증가 버튼을 여러 번 클릭하면, 
				수량이 예상보다 더 많이 증가할 수 있습니다.
			2.동적 요소 처리:
				웹 페이지에서 동적으로 생성되는 요소에 이벤트를 등록할 때, 
				이전 이벤트 핸들러를 제거하지 않으면 문제가 발생할 수 있습니다. 
				동적으로 생성된 버튼에 대해 여러 번 이벤트가 등록될 수 있습니다.
	-->
</body>
</html>
