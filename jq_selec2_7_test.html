<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>
<body>

<!-- 
	배열 관련 메소드?
	배열의 정보를 반복해서 가져오고 배열의 정보를 조작할 수 있는 메소드들을 말함

	종류 ->  each() 메소드,   $.each() 메소드
	
	each()메소드
	- 배열에 저장된 문서 객체의 개수만큼 each 메소드 내부에 적힌 function 이 반복 실행되서
	  배열 저장된 문서 객체를 가져오고, 그 문서 객체가 배열에 저장되어 있는 index 위치 번호 값을
	  가져올 수 있게 하는 메소드
	- 문법1.
			$("요소들선택").each(function(매개변수1,매개변수2){   });
	
	- 문법2. $("요소들선택").each(function(){ $(this) });
	
	$.each()메소드
	- 배열에 저장된 문서객체(DO) 개수 만큼 $.each() 메소드 내부의 function 이 반복 실행되면서
	  배열에 저장된 문서 객체를 index 순서대로 하나씩 접근해서 
	  문서 객체를 가져오고 그 문서객체가 배열에 저장되어 있는 index 위치 번호 값을 가져올 수 있게 하는 메소드
	- 문법1.
				$.each( $("요소들선택"), function(매개변수1, 매개변수2){    } );
	- 문법2.    
				$.each( $("요소들선택"), function(){ $(this) } );	
 -->

	<h1>탐색 선택자</h1>
	<ul id="menu1">
		<li>내용1-1</li>
		<li>내용1-2</li>
		<li>내용1-3</li>		
	</ul>
	<ul id="menu2">
		<li>내용2-1</li>
		<li>내용2-2</li>
		<li>내용2-3</li>		
	</ul>		
	<script type="text/javascript">
		/*
			$("menu2 li")
			
			-> [<li>내용2-1</li>, <li>내용2-2</li>, <li>내용2-3</li>]
					   0				1				2			<--- index
					   
			$.each 메소드를 호출하여 DOM 요소들을 배열에 담아 선택해서
			배열에 저장된 DOM 요소 개수만큼 function 을 반복 실행해서 매개변수로 각각 요소들을 얻어 사용
		*/	
		$.each($("#menu2 li"), function(index, object){
			
			console.log(index + "index : ", object);
			
		});
		
		/*
			$("menu2 li")
			
			-> [<li>내용2-1</li>, <li>내용2-2</li>, <li>내용2-3</li>]
					   0				1				2			<--- index
		*/	
		$.each($("#menu2 li"), function(index){
			
			console.log(index + "index : ", $(this));
		//	console.log(  0   +  index : <li>내용2-1</li>);
		//	console.log(  0   +  index : <li>내용2-2</li>);
		//	console.log(  0   +  index : <li>내용2-3</li>);
		});
	
		let obj = [{"area":"서울"}, {"area":"부산"}, {"area":"전주"}];	// <--- 배열
		//				 0				 1				 2			   <--- index
		
		/*
			설명: obj 배열 전체를 선택해서 가져와서
				 obj 배열의 각 칸에 저장된 {"속성":"값"} 객체들의 개수 만큼 function 을 반복해서 수행합니다.
				 function 의 첫 번째 매개변수 index 자리에는 첫 index 0 부터 넘겨받고
				 			두 번째 매개변수 object 자리에는 {"area":"서울"} 객체 한 쌍을 매개변수로 받아 사용합니다.
				 			
	 			 function 의 첫 번째 매개변수 index 자리에는 첫 index 0 부터 넘겨받고
	 			 			두 번째 매개변수 object 자리에는 {"area":"부산"} 객체 한 쌍을 매개변수로 받아 사용합니다.
	 			
	 			 function 의 첫 번째 매개변수 index 자리에는 첫 index 0 부터 넘겨받고
	 			       	    두 번째 매개변수 object 자리에는 {"area":"전주"} 객체 한 쌍을 매개변수로 받아 사용합니다.
	 			       	    
	 			 obj 배열에서 더 이상 꺼내올 객체가 없으면 each 메소드 종료
		*/
		$(obj).each(function(index, object){
			
			console.log(index, object);
			
		});
		
	</script>
	
</body>
</html>
