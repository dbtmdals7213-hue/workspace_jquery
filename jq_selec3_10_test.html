<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
</head>
<body>
	<ul id="listZone">
		<li>리스트</li>
<!--	<li>리스트 append</li>	-->
<!--	<li>리스트 appendTo</li>    -->
	</ul>
	<script>
		// $("요소선택").append("새 요소 작성해서 넣기");
		$("#listZone").append("<li>리스트 append</li>");
	
		// $("새 요소 작성해서 넣기").appendTo("요소 선택");
		$("<li>리스트 appendTo</li>").appendTo("#listZone");
	</script>
	
	<!-- 
		DOM 객체(HTML 태그) 편집 메소드 종류
		
		append(), appendTo()
			 - 선택한 요소 내의 마지막 위치에 새 요소를 생성하고 추가합니다.
			 - $("요소선택").append("새요소");
			 - $("새요소").appendTo("요소선택");
	
		prepend(), prependTo()
			 - 선택한 요소 내의 앞 위치에 새 요소를 생성하고 추가합니다.
			 - $("요소선택").prepend("새요소");
			 - $("새요소").prependTo("요소선택");
	 -->
	 
</body>
</html>
