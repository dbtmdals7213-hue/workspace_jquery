<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title> 객체 조작 및 생성 </title>  

	<!-- 
		객체 편집 메소드 종류
		
		before(), insertBefore()
			 - 선택한 요소의 이전 위치에 새 요소를 생성하여 추가하는 메소드 
			 - $("요소선택").before("추가할 새 요소생성");
			 - $("추가할 새 요소").insertBefore("요소선택");
		
		after(), insertAfter()
			 - 선택한 요소의 다음 위치에 새 요소를 생성하여 추가하는 메소드
			 - $("요소선택").after("추가할 새 요소생성");
			 - $("추가할 새 요소").insertAfter("요소선택");
	 -->
	 
	<script src="http://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		$(function(){
			/*
				1. $("#wrap) 
					-> <div id="wrap">...</div> 요소 한 쌍 선택
				
				2. $("#wrap p) 
					-> [<p>내용1</p>, <p>내용2</p>, <p>내용3</p>] 배열에 담아 선택
				
				3. $("#wrap p:eq(2)") 
					-> 2 index 에 저장된 <p>내용3</p> 요소 최종 선택
					
				4. $("#wrap p:eq(2)").after("<p>내용4</p>")
					-> .after("<p>내용4</p>") 호출해 <p>내용3</p> 요소 뒤에 
					   새 요소 "<p>After</p>" 를 동적으로 추가
			*/
			$("#wrap p:eq(2)").after("<p>After</p>");
			
			
			/*
				insertAfter 메소드 사용법
				
					$("추가할 새 요소 작성").insertAfter("요소선택");
			*/
			$("<p>insertAfter</p>").insertAfter("#wrap p:eq(1)");
			
			
			/*
				<p>내용2</p> 요소 선택해서 before 메소드 호출 시 인자로 새 요소
				<p>Before</p> 를 생성해서 앞에서 선택한 <p>내용2</p> 이전 위치에 동적으로 추가
			*/
			$("p").eq(1).before("<p>Before</p>");
			
			
			// $("추가할 새 요소").insertBefore("요소선택")
			$("<p>insertBefore</p>").insertBefore("p:eq(0)");
			
			/*
				<div id="wrap">
					<p>insertBefore</p>	<-- insertBefore 로 추가
					<p>내용1</p>
					<p>Before</p>		<-- Before 로 추가
					<p>내용2</p>
					<p>insertAfter</p>	<-- insertAfter 로 추가
					<p>내용3</p>
					<p>After</p>		<-- After 로 추가
				</div>
			*/
		});
	</script>
</head>
<body>
	<div id="wrap">
		<p>내용1</p>	
		<p>내용2</p>
		<p>내용3</p>
	</div>
</body>
</html>
